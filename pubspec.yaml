name: algoverse
description: "AlgoVerse - Learn smarter. One concept at a time."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3

  # Google Auth
  google_sign_in: ^6.2.1

  # Navigation
  go_router: ^14.3.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local SQLite
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # UI / Rendering
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  lottie: ^3.1.2
  rive: ^0.13.14
  flutter_html: ^3.0.0-beta.2
  flutter_highlight: ^0.7.0
  flutter_markdown: ^0.7.4

  # Gemini AI
  google_generative_ai: ^0.4.6

  # Networking
  http: ^1.2.2

  # Environment
  flutter_dotenv: ^5.2.1

  # Storage
  shared_preferences: ^2.3.3

  # Audio
  audioplayers: ^6.1.0

  # Formatting
  intl: ^0.19.0

  # Image capture for share cards
  screenshot: ^3.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  drift_dev: ^2.20.2

flutter:
  uses-material-design: true

  assets:
    - assets/data/concept_aliases.json
    - assets/animations/
    - assets/sounds/
    - assets/illustrations/
    - assets/images/notification/
    - assets/badges/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/jetbrains_mono/JetBrainsMono-Bold.ttf
          weight: 700
